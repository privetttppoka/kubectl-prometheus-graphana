apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: crud-demo
data:
  DATABASE_URL: "host=postgres user=postgres password=postgres dbname=cruddb sslmode=disable"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: crud-app
  namespace: crud-demo
spec:
  replicas: 2
  selector:
    matchLabels:
      app: crud-app
  template:
    metadata:
      labels:
        app: crud-app
    spec:
      containers:
        - name: crud-app
          image: crud-app:latest
          imagePullPolicy: Never        # использует локальный образ (kind load)
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: app-config
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: crud-app
  namespace: crud-demo
spec:
  selector:
    app: crud-app
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Доступ снаружи кластера (для kind используем NodePort или port-forward)
apiVersion: v1
kind: Service
metadata:
  name: crud-app-nodeport
  namespace: crud-demo
spec:
  type: NodePort
  selector:
    app: crud-app
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30080
