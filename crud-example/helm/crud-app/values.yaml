namespace: crud-demo

app:
  image:
    repository: crud-app
    tag: latest
    pullPolicy: Never
  replicas: 2
  port: 8080
  resources:
    requests:
      cpu: 50m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi
  readinessProbe:
    initialDelaySeconds: 3
    periodSeconds: 5

service:
  port: 80
  nodePort: 30080

postgres:
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: Never
  user: postgres
  password: postgres
  db: cruddb
  port: 5432
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 5
